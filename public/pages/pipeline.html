<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline — CRM</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    .score-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      font-size: 0.72rem; font-weight: 800;
      position: relative; cursor: help; flex-shrink: 0;
    }
    .score-inner {
      width: 28px; height: 28px; border-radius: 50%;
      background: white; display: flex; align-items: center;
      justify-content: center; font-size: 0.7rem; font-weight: 800;
    }
    .score-tooltip {
      display: none;
      position: absolute; bottom: 44px; right: 0;
      width: 220px; background: var(--bleu);
      border-radius: 10px; padding: 12px 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 100; color: white;
    }
    .score-badge:hover .score-tooltip { display: block; }
    .score-tooltip::after {
      content: ''; position: absolute; bottom: -6px; right: 10px;
      width: 12px; height: 12px; background: var(--bleu);
      transform: rotate(45deg);
    }
    .score-tooltip-title {
      font-size: 0.78rem; font-weight: 700; margin-bottom: 8px;
      color: var(--or-clair); border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 6px;
    }
    .score-critere {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.72rem; padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .score-critere:last-child { border-bottom: none; }
    .score-critere .critere-label { color: rgba(255,255,255,0.75); }
    .score-critere .critere-val { font-weight: 700; color: var(--or-clair); }
    .score-critere .critere-val.negatif { color: #f87171; }
    .score-total {
      display: flex; justify-content: space-between;
      font-size: 0.8rem; font-weight: 800;
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.2);
      color: white;
    }
    .kanban-col[data-etape="nouveau"]       .kanban-col-header { background: #f1f5f9; border-bottom: 3px solid #94a3b8; }
    .kanban-col[data-etape="qualification"] .kanban-col-header { background: #fefce8; border-bottom: 3px solid #eab308; }
    .kanban-col[data-etape="proposition"]   .kanban-col-header { background: #eff6ff; border-bottom: 3px solid #3b82f6; }
    .kanban-col[data-etape="negociation"]   .kanban-col-header { background: #faf5ff; border-bottom: 3px solid #7c3aed; }
    .kanban-col[data-etape="gagne"]         .kanban-col-header { background: #f0fdf4; border-bottom: 3px solid #16a34a; }
    .kanban-col[data-etape="perdu"]         .kanban-col-header { background: #fff1f2; border-bottom: 3px solid #dc2626; }
    .kanban-card { position: relative; }
    .kanban-card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px; margin-bottom: 6px;
    }
    .kanban-card-titre { font-weight: 700; font-size: 13px; color: var(--bleu); flex: 1; line-height: 1.3; }
    .kanban-card-contact { font-size: 12px; color: var(--gris); }
    .kanban-card-montant { font-size: 13px; font-weight: 800; color: var(--bleu); }
    .kanban-card-footer {
      display: flex; justify-content: space-between;
      align-items: center; margin-top: 8px;
      padding-top: 8px; border-top: 1px solid var(--bordure);
    }
    .kanban-card-date { font-size: 0.72rem; color: var(--gris); display: flex; align-items: center; gap: 4px; }
    .kanban-card-date.urgente { color: #dc2626; font-weight: 600; }
    .kanban-card-proba { font-size: 0.72rem; font-weight: 600; color: var(--gris); display: flex; align-items: center; gap: 4px; }
    .kanban-col-total { font-size: 0.72rem; color: var(--gris); font-weight: 500; }
    .scores-legende {
      display: flex; gap: 16px; align-items: center;
      background: white; border: 1px solid var(--bordure);
      border-radius: 8px; padding: 10px 16px;
      margin-bottom: 16px; font-size: 0.78rem;
    }
    .legende-item { display: flex; align-items: center; gap: 6px; }
    .legende-dot { width: 10px; height: 10px; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-mount"></div>
    <div class="main-content">
      <div class="page-header">
        <div>
          <h1>Pipeline des opportunités</h1>
          <p>Glissez-déposez les cartes pour changer d'étape</p>
        </div>
        <button class="btn btn-primary" onclick="openModal()">
          <i class="bi bi-plus-lg"></i> Nouvelle opportunité
        </button>
      </div>

      <div class="scores-legende">
        <span style="font-weight:700; color:var(--bleu); font-size:0.78rem;">
          <i class="bi bi-info-circle"></i> Score de priorité :
        </span>
        <div class="legende-item">
          <div class="legende-dot" style="background:#22c55e;"></div>
          <span>≥ 70 — 🔥 Haute priorité</span>
        </div>
        <div class="legende-item">
          <div class="legende-dot" style="background:#f59e0b;"></div>
          <span>40–69 — ⚡ Moyenne priorité</span>
        </div>
        <div class="legende-item">
          <div class="legende-dot" style="background:#ef4444;"></div>
          <span>&lt; 40 — ❄️ Faible priorité</span>
        </div>
        <span style="color:var(--gris); margin-left:auto;">
          <i class="bi bi-cursor"></i> Survolez le score pour voir le détail des critères
        </span>
      </div>

      <div class="kanban-board" id="kanban-board"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" style="position:relative;">
      <button class="modal-close" onclick="closeModal()">
        <i class="bi bi-x"></i>
      </button>
      <h2 id="modal-title">Nouvelle opportunité</h2>
      <form id="opp-form">
        <input type="hidden" id="opp-id">
        <div class="form-group">
          <label>Titre *</label>
          <input type="text" id="titre" required>
        </div>
        <div class="form-group">
          <label>Contact lié</label>
          <select id="contact_id"><option value="">— Aucun —</option></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Montant (XOF)</label>
            <input type="number" id="montant" step="0.01" value="0">
          </div>
          <div class="form-group">
            <label>Probabilité (%)</label>
            <input type="number" id="probabilite" min="0" max="100" value="10">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Étape</label>
            <select id="etape">
              <option value="nouveau">Nouveau</option>
              <option value="qualification">Qualification</option>
              <option value="proposition">Proposition</option>
              <option value="negociation">Négociation</option>
              <option value="gagne">Gagné</option>
              <option value="perdu">Perdu</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date de clôture prévue</label>
            <input type="date" id="date_cloture_prevue">
          </div>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="notes" rows="3"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const ETAPES = [
      { key: 'nouveau',       label: 'Nouveau' },
      { key: 'qualification', label: 'Qualification' },
      { key: 'proposition',   label: 'Proposition' },
      { key: 'negociation',   label: 'Négociation' },
      { key: 'gagne',         label: 'Gagné' },
      { key: 'perdu',         label: 'Perdu' }
    ];

    let opportunites = [];
    let contacts     = [];

    function calculerScore(opp) {
      let score = 0;
      const criteres = [];
      const pointsEtape = { nouveau: 10, qualification: 25, proposition: 45, negociation: 65, gagne: 100, perdu: 0 };
      const ptEtape = pointsEtape[opp.etape] || 0;
      score += ptEtape;
      criteres.push({ label: `Étape (${opp.etape})`, val: ptEtape });

      const ptProba = Math.round((opp.probabilite || 0) / 10);
      score += ptProba;
      criteres.push({ label: `Probabilité (${opp.probabilite || 0}%)`, val: ptProba });

      let ptMontant = 0;
      if ((opp.montant || 0) >= 500000) ptMontant = 10;
      else if ((opp.montant || 0) >= 100000) ptMontant = 5;
      score += ptMontant;
      if (ptMontant > 0) criteres.push({ label: `Montant élevé`, val: ptMontant });

      const joursDepuisCreation = opp.created_at
        ? Math.floor((new Date() - new Date(opp.created_at)) / (1000 * 60 * 60 * 24)) : 0;
      let ptAnciennete = 0;
      if (joursDepuisCreation > 60) ptAnciennete = -20;
      else if (joursDepuisCreation > 30) ptAnciennete = -10;
      score += ptAnciennete;
      if (ptAnciennete < 0) criteres.push({ label: `Stagnation (${joursDepuisCreation}j)`, val: ptAnciennete, negatif: true });

      let ptDate = 0;
      if (opp.date_cloture_prevue) {
        const joursRestants = Math.ceil((new Date(opp.date_cloture_prevue) - new Date()) / (1000 * 60 * 60 * 24));
        if (joursRestants <= 7 && joursRestants >= 0) ptDate = 5;
        criteres.push({ label: `Clôture dans ${joursRestants}j`, val: ptDate });
      }
      score += ptDate;
      score = Math.max(0, Math.min(100, score));
      let priorite = 'faible';
      if (score >= 70) priorite = 'haute';
      else if (score >= 40) priorite = 'moyenne';
      return { score, priorite, criteres };
    }

    function couleurScore(score) {
      if (score >= 70) return '#22c55e';
      if (score >= 40) return '#f59e0b';
      return '#ef4444';
    }

    function renderScoreBadge(opp) {
      const { score, priorite, criteres } = calculerScore(opp);
      const couleur = couleurScore(score);
      const emoji   = priorite === 'haute' ? '🔥' : priorite === 'moyenne' ? '⚡' : '❄️';
      const critereHtml = criteres.map(c => `
        <div class="score-critere">
          <span class="critere-label">${c.label}</span>
          <span class="critere-val ${c.negatif ? 'negatif' : ''}">
            ${c.val > 0 ? '+' : ''}${c.val} pts
          </span>
        </div>
      `).join('');
      return `
        <div class="score-badge" style="background: conic-gradient(${couleur} ${score * 3.6}deg, #f3f4f6 0deg);">
          <div class="score-inner" style="color:${couleur};">${score}</div>
          <div class="score-tooltip">
            <div class="score-tooltip-title">${emoji} Score de priorité</div>
            ${critereHtml}
            <div class="score-total">
              <span>Score total</span>
              <span style="color:${couleur};">${score} / 100</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderKanban() {
      const board = document.getElementById('kanban-board');
      board.innerHTML = ETAPES.map(etape => {
        const cards = opportunites.filter(o => o.etape === etape.key);
        const total = cards.reduce((s, c) => s + (c.montant || 0), 0);
        return `
          <div class="kanban-col" data-etape="${etape.key}"
            ondragover="onDragOver(event)"
            ondragleave="onDragLeave(event)"
            ondrop="onDrop(event, '${etape.key}')">
            <div class="kanban-col-header">
              <span>${etape.label} (${cards.length})</span>
              <span class="kanban-col-total">${formatMontant(total)}</span>
            </div>
            ${cards.map(c => {
              let dateHtml = '';
              if (c.date_cloture_prevue) {
                const jours = Math.ceil((new Date(c.date_cloture_prevue) - new Date()) / (1000 * 60 * 60 * 24));
                const urgente = jours <= 7 && jours >= 0;
                dateHtml = `
                  <div class="kanban-card-date ${urgente ? 'urgente' : ''}">
                    <i class="bi bi-calendar${urgente ? '-x' : ''}"></i>
                    ${urgente ? `⚠️ ${jours}j restants` : formatDate(c.date_cloture_prevue)}
                  </div>`;
              }
              return `
                <div class="kanban-card"
                  draggable="true"
                  ondragstart="onDragStart(event, ${c.id})"
                  onclick="editOpp(${c.id})"
                  style="border-left: 3px solid #e5e7eb;">
                  <div class="kanban-card-header">
                    <div class="kanban-card-titre">${c.titre}</div>
                    ${renderScoreBadge(c)}
                  </div>
                  <div class="kanban-card-contact">
                    <i class="bi bi-person" style="color:var(--gris);"></i>
                    ${c.contact_nom || 'Sans contact'}
                    ${c.contact_entreprise ? `· ${c.contact_entreprise}` : ''}
                  </div>
                  <div class="kanban-card-meta" style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                    <div class="kanban-card-montant">${formatMontant(c.montant || 0)}</div>
                    <div class="kanban-card-proba">
                      <i class="bi bi-percent"></i> ${c.probabilite || 0}%
                    </div>
                  </div>
                  ${dateHtml ? `<div class="kanban-card-footer">${dateHtml}</div>` : ''}
                </div>`;
            }).join('')}
          </div>`;
      }).join('');
    }

    function onDragStart(e, id) { e.dataTransfer.setData('text/plain', id); }
    function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    async function onDrop(e, nouvelleEtape) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      await api.put('/api/opportunites/' + id, { etape: nouvelleEtape });
      await refreshOpportunites();
    }

    function openModal() {
      document.getElementById('modal-title').textContent = 'Nouvelle opportunité';
      document.getElementById('opp-form').reset();
      document.getElementById('opp-id').value = '';
      document.getElementById('modal-overlay').classList.add('open');
    }

    function editOpp(id) {
      const o = opportunites.find(x => x.id === id);
      if (!o) return;
      document.getElementById('modal-title').textContent   = 'Modifier l\'opportunité';
      document.getElementById('opp-id').value             = o.id;
      document.getElementById('titre').value              = o.titre;
      document.getElementById('contact_id').value         = o.contact_id || '';
      document.getElementById('montant').value            = o.montant;
      document.getElementById('probabilite').value        = o.probabilite;
      document.getElementById('etape').value              = o.etape;
      document.getElementById('date_cloture_prevue').value = o.date_cloture_prevue || '';
      document.getElementById('notes').value              = o.notes || '';
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

    async function saveOpp(e) {
      e.preventDefault();
      const id = document.getElementById('opp-id').value;
      const payload = {
        titre:               document.getElementById('titre').value,
        contact_id:          document.getElementById('contact_id').value || null,
        montant:             parseFloat(document.getElementById('montant').value) || 0,
        devise:              'XOF',
        etape:               document.getElementById('etape').value,
        probabilite:         parseInt(document.getElementById('probabilite').value) || 0,
        date_cloture_prevue: document.getElementById('date_cloture_prevue').value || null,
        notes:               document.getElementById('notes').value
      };
      try {
        if (id) { await api.put('/api/opportunites/' + id, payload); }
        else    { await api.post('/api/opportunites', payload); }
        closeModal();
        await refreshOpportunites();
      } catch(err) { alert(err.message); }
    }

    async function loadPipeline() {
      await initSidebar('pipeline');
      contacts = await api.get('/api/contacts');
      document.getElementById('contact_id').innerHTML +=
        contacts.map(c => `<option value="${c.id}">${c.nom}${c.entreprise ? ' — ' + c.entreprise : ''}</option>`).join('');
      await refreshOpportunites();
      document.getElementById('opp-form').addEventListener('submit', saveOpp);
    }

    async function refreshOpportunites() {
      opportunites = await api.get('/api/opportunites');
      renderKanban();
    }

    loadPipeline();
  </script>
</body>
</html>
