<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tâches — CRM</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-mount"></div>

    <div class="main-content">
      <div class="page-header">
        <div>
          <h1>Tâches & Suivi</h1>
          <p>Vos actions à mener</p>
        </div>
        <button class="btn btn-primary" onclick="openModal()">+ Nouvelle tâche</button>
      </div>

      <div class="toolbar">
        <select id="filter-statut">
          <option value="">Tous statuts</option>
          <option value="a_faire">À faire</option>
          <option value="en_cours">En cours</option>
          <option value="terminee">Terminée</option>
          <option value="annulee">Annulée</option>
        </select>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Titre</th>
              <th>Contact</th>
              <th>Priorité</th>
              <th>Échéance</th>
              <th>Assigné à</th>
              <th>Statut</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="taches-tbody"></tbody>
        </table>
        <div class="empty-state" id="empty-state" style="display:none">
          <p>Aucune tâche. Cliquez sur "Nouvelle tâche" pour en créer une.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Création -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>Nouvelle tâche</h2>
      <form id="tache-form">
        <div class="form-group">
          <label>Titre *</label>
          <input type="text" id="titre" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Contact lié</label>
          <select id="contact_id"><option value="">— Aucun —</option></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Priorité</label>
            <select id="priorite">
              <option value="basse">Basse</option>
              <option value="normale" selected>Normale</option>
              <option value="haute">Haute</option>
              <option value="urgente">Urgente</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date d'échéance</label>
            <input type="date" id="date_echeance">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    let taches = [];
    let contacts = [];

    async function loadTaches() {
      await initSidebar('taches');
      contacts = await api.get('/api/contacts');
      document.getElementById('contact_id').innerHTML += contacts.map(c => `<option value="${c.id}">${c.nom}</option>`).join('');

      await refreshTaches();
      document.getElementById('filter-statut').addEventListener('change', refreshTaches);
      document.getElementById('tache-form').addEventListener('submit', saveTache);
    }

    async function refreshTaches() {
      const statut = document.getElementById('filter-statut').value;
      const params = new URLSearchParams();
      if (statut) params.set('statut', statut);

      taches = await api.get('/api/taches?' + params.toString());
      renderTaches();
    }

    function renderTaches() {
      const tbody = document.getElementById('taches-tbody');
      const emptyState = document.getElementById('empty-state');

      if (taches.length === 0) {
        tbody.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';

      tbody.innerHTML = taches.map(t => `
        <tr>
          <td><strong>${t.titre}</strong></td>
          <td>${t.contact_nom || '—'}</td>
          <td>${badge(t.priorite)}</td>
          <td>${formatDate(t.date_echeance)}</td>
          <td>${t.assigned_nom || '—'}</td>
          <td>
            <select onchange="changeStatut(${t.id}, this.value)" style="border:none;background:transparent;font-size:11px;font-weight:600;">
              ${['a_faire','en_cours','terminee','annulee'].map(s => `<option value="${s}" ${t.statut === s ? 'selected' : ''}>${s.replace('_',' ')}</option>`).join('')}
            </select>
          </td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteTache(${t.id})">Suppr.</button></td>
        </tr>
      `).join('');
    }

    async function changeStatut(id, statut) {
      await api.put('/api/taches/' + id, { statut });
      await refreshTaches();
    }

    function openModal() {
      document.getElementById('tache-form').reset();
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
    }

    async function saveTache(e) {
      e.preventDefault();
      const payload = {
        titre: document.getElementById('titre').value,
        description: document.getElementById('description').value,
        contact_id: document.getElementById('contact_id').value || null,
        priorite: document.getElementById('priorite').value,
        date_echeance: document.getElementById('date_echeance').value || null
      };

      try {
        await api.post('/api/taches', payload);
        closeModal();
        await refreshTaches();
      } catch (err) {
        alert(err.message);
      }
    }

    async function deleteTache(id) {
      if (!confirm('Supprimer cette tâche ?')) return;
      await api.delete('/api/taches/' + id);
      await refreshTaches();
    }

    loadTaches();
  </script>
</body>
</html>
